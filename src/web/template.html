<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Analise de Exoplanetas</title>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background: #f5f5f5;
            color: #222;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #ddd;
            padding: 20px;
        }

        select {
            margin-top: 8px;
            padding: 8px;
            min-width: 340px;
            max-width: 100%;
        }

        #resumo {
            margin-top: 10px;
            padding: 12px;
            border: 1px solid #ddd;
            background: #fafafa;
        }

        .resumo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 10px;
        }

        .resumo-card {
            background: #fff;
            border: 1px solid #e4e4e4;
            padding: 10px;
        }

        .resumo-card h4 {
            margin: 0 0 8px;
            font-size: 14px;
        }

        .resumo-item {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 6px;
            font-size: 14px;
            align-items: flex-start;
        }

        .resumo-item span {
            color: #555;
            white-space: nowrap;
        }

        .resumo-item b {
            text-align: right;
            font-weight: 600;
            word-break: break-word;
        }

        .metodos {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 6px;
        }

        .metodo-tag {
            display: inline-block;
            padding: 2px 8px;
            border: 1px solid #bbb;
            border-radius: 999px;
            background: #fff;
            font-size: 12px;
            color: #222;
        }

        .top-charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .chart-top {
            min-height: 300px;
            border: 1px solid #eee;
        }

        .bottom-charts {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chart-bottom {
            min-height: 320px;
            border: 1px solid #eee;
        }

        .actions {
            margin-top: 20px;
        }

        button {
            padding: 10px 14px;
            border: 1px solid #444;
            background: #fff;
            cursor: pointer;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        @media (max-width: 640px) {
            .resumo-item {
                flex-direction: column;
                gap: 4px;
            }

            .resumo-item b {
                text-align: left;
            }

            .metodos {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Analise Estatistica de Exoplanetas</h1>

    <label for="seletorPlaneta">Selecione o planeta</label><br>
    <select id="seletorPlaneta"></select>

    <h2 id="titulo">Carregando dados...</h2>
    <div id="resumo">Aguardando dados...</div>

    <h3>Comparacao com referencia da Terra</h3>
    <div class="top-charts">
        <div id="grafico_comp_periodo" class="chart-top"></div>
        <div id="grafico_comp_raio" class="chart-top"></div>
        <div id="grafico_comp_massa" class="chart-top"></div>
    </div>

    <h3>Estatisticas por metrica</h3>
    <div class="bottom-charts">
        <div id="grafico_stats_periodo" class="chart-bottom"></div>
        <div id="grafico_stats_raio" class="chart-bottom"></div>
        <div id="grafico_stats_massa" class="chart-bottom"></div>
    </div>

    <div class="actions">
        <button onclick="chamarApi('/atualizar-banco')">Atualizar MySQL</button>
        <button onclick="chamarApi('/limpar-banco')">Limpar Banco</button>
        <button onclick="chamarApi('/gerar-json')">Gerar JSON</button>
        <button onclick="chamarApi('/gerar-xml')">Gerar XML</button>
    </div>
</div>

<script>
    google.charts.load('current', {packages: ['corechart']});
    google.charts.setOnLoadCallback(carregarDados);

    const seletor = document.getElementById('seletorPlaneta');
    let dadosGlobais = [];

    seletor.addEventListener('change', atualizarGrafico);

    function valorSeguro(valor) {
        const numero = Number(valor);
        if (!Number.isFinite(numero) || numero < 0) {
            return 0;
        }
        return numero;
    }

    function formatar(valor, casas = 2) {
        return valorSeguro(valor).toFixed(casas);
    }

    function formatarInteiro(valor) {
        return Math.round(valorSeguro(valor)).toLocaleString('pt-BR');
    }

    function formatarAno(valor) {
        const ano = Number(valor);
        if (!Number.isFinite(ano) || ano <= 0) {
            return 'Nao informado';
        }
        return String(Math.trunc(ano));
    }

    function normalizarMetodos(valor) {
        if (Array.isArray(valor)) {
            return valor
                .map((item) => String(item || '').trim())
                .filter((item) => item.length > 0);
        }

        const texto = String(valor || '').trim();
        if (!texto) {
            return [];
        }

        return [texto];
    }

    function escapeHtml(texto) {
        return String(texto)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function formatarMetodos(valor) {
        const metodos = normalizarMetodos(valor);
        if (metodos.length === 0) {
            return '<span class="metodo-tag">Nao informado</span>';
        }

        return metodos
            .map((metodo) => `<span class="metodo-tag">${escapeHtml(metodo)}</span>`)
            .join('');
    }

    function formatarCientifico(valor) {
        const n = valorSeguro(valor);
        if (n === 0) {
            return '0';
        }
        const exp = Math.floor(Math.log10(n));
        const mant = n / Math.pow(10, exp);
        return `${mant.toFixed(3)} x 10^${exp}`;
    }

    function montarResumo(p) {
        const metodos = formatarMetodos(p.discoveryMethods || p.discoveryMethod);

        return `
            <div class="resumo-grid">
                <section class="resumo-card">
                    <h4>Descoberta</h4>
                    <div class="resumo-item"><span>Ano</span><b>${formatarAno(p.discoveryYear)}</b></div>
                    <div class="resumo-item"><span>Metodo(s)</span><div class="metodos">${metodos}</div></div>
                    <div class="resumo-item"><span>Distancia</span><b>${formatar(p.distanceParsec)} pc (~${formatar(p.distanceLightYears)} anos-luz)</b></div>
                </section>

                <section class="resumo-card">
                    <h4>Referencia Terra</h4>
                    <div class="resumo-item"><span>Periodo</span><b>${formatar(p.periodoTerraDias)} dias</b></div>
                    <div class="resumo-item"><span>Raio</span><b>${formatarInteiro(p.raioTerraKm)} km</b></div>
                    <div class="resumo-item"><span>Massa</span><b>${formatarCientifico(p.massaTerraKg)} kg</b></div>
                </section>

                <section class="resumo-card">
                    <h4>Planeta</h4>
                    <div class="resumo-item"><span>Periodo</span><b>${formatar(p.periodoPlanetaDias)} dias (${formatar(p.periodoTerraX)}x Terra)</b></div>
                    <div class="resumo-item"><span>Raio</span><b>${formatarInteiro(p.raioPlanetaKm)} km (${formatar(p.raioTerraX)}x Terra)</b></div>
                    <div class="resumo-item"><span>Massa</span><b>${formatarCientifico(p.massaPlanetaKg)} kg (${formatar(p.massaTerraX)}x Terra)</b></div>
                </section>
            </div>
        `;
    }

    async function carregarDados() {
        try {
            const response = await fetch('/dados');
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const dados = await response.json();
            dadosGlobais = dados;
            seletor.innerHTML = '';

            dados.forEach((item, index) => {
                const option = document.createElement('option');
                option.value = String(index);
                option.textContent = item.planeta;
                seletor.appendChild(option);
            });

            if (dados.length === 0) {
                document.getElementById('titulo').textContent = 'Nenhum planeta com periodo, raio e massa encontrado.';
                document.getElementById('resumo').textContent = 'Sem dados completos para exibir.';
                return;
            }

            atualizarGrafico();
        } catch (error) {
            document.getElementById('titulo').textContent = 'Servidor offline em http://localhost:8080';
            document.getElementById('resumo').textContent = 'Inicie a aplicacao Java e mantenha ela rodando para habilitar os endpoints.';
        }
    }

    function atualizarGrafico() {
        const index = Number(seletor.value || 0);
        const p = dadosGlobais[index];
        if (!p) {
            return;
        }

        document.getElementById('titulo').textContent = p.planeta;
        document.getElementById('resumo').innerHTML = montarResumo(p);

        desenharComparacao(
            'grafico_comp_periodo',
            'Periodo orbital (dias)',
            p.periodoTerraDias,
            p.periodoPlanetaDias,
            'Dias'
        );

        desenharComparacao(
            'grafico_comp_raio',
            'Raio (km)',
            p.raioTerraKm,
            p.raioPlanetaKm,
            'Km'
        );

        desenharComparacao(
            'grafico_comp_massa',
            'Massa (kg)',
            p.massaTerraKg,
            p.massaPlanetaKg,
            'Kg'
        );

        desenharEstatisticas(
            'grafico_stats_periodo',
            'Periodo orbital - media, mediana, moda, variancia',
            p.periodoMedia,
            p.periodoMediana,
            p.periodoModa,
            p.periodoVariancia,
            'Dias'
        );

        desenharEstatisticas(
            'grafico_stats_raio',
            'Raio - media, mediana, moda, variancia',
            p.raioMedia,
            p.raioMediana,
            p.raioModa,
            p.raioVariancia,
            'Raios terrestres'
        );

        desenharEstatisticas(
            'grafico_stats_massa',
            'Massa - media, mediana, moda, variancia',
            p.massaMedia,
            p.massaMediana,
            p.massaModa,
            p.massaVariancia,
            'Massas terrestres'
        );
    }

    function desenharComparacao(elementId, titulo, valorTerra, valorPlaneta, eixoY) {
        const data = new google.visualization.DataTable();
        data.addColumn('string', 'Referencia');
        data.addColumn('number', 'Valor');
        data.addRows([
            ['Terra', valorSeguro(valorTerra)],
            ['Planeta', valorSeguro(valorPlaneta)]
        ]);

        const options = {
            title: titulo,
            legend: {position: 'none'},
            vAxis: {title: eixoY, minValue: 0}
        };

        const chart = new google.visualization.ColumnChart(document.getElementById(elementId));
        chart.draw(data, options);
    }

    function desenharEstatisticas(elementId, titulo, media, mediana, moda, variancia, eixoY) {
        const data = new google.visualization.DataTable();
        data.addColumn('string', 'Estatistica');
        data.addColumn('number', 'Valor');
        data.addRows([
            ['Media', valorSeguro(media)],
            ['Mediana', valorSeguro(mediana)],
            ['Moda', valorSeguro(moda)],
            ['Variancia', valorSeguro(variancia)]
        ]);

        const options = {
            title: titulo,
            legend: {position: 'none'},
            vAxis: {title: eixoY, minValue: 0}
        };

        const chart = new google.visualization.BarChart(document.getElementById(elementId));
        chart.draw(data, options);
    }

    async function chamarApi(rota) {
        try {
            const response = await fetch(rota);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const mensagem = await response.text();
            alert(mensagem);
        } catch (error) {
            alert('Nao foi possivel conectar ao backend em http://localhost:8080. Inicie a aplicacao Java e tente de novo.');
        }
    }
</script>
</body>
</html>
